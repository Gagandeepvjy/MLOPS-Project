data_ingestion:
  source_file: src/dataset.csv
  test_size: 0.2
  random_state: 42

preprocessing:
  raw_dir: data/raw
  interim_dir: data/interim
  missing_values: ["?", "xxxxxxx", "xxxxxxxx"]
  drop_columns: ["security_no", "referral_id"]
  date_columns: ["joining_date"]
  time_columns: ["last_visit_time"]

feature_engineering:
  target_col: churn_risk_score
  processed_dir: data/processed
  models_dir: models

model:
  target_col: churn_risk_score
  n_estimators: 100
  random_state: 42
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1

evaluation:
  target_col: churn_risk_score
  metrics_dir: metrics
  reports_dir: reports

mlflow:
  log_params: true
  log_artifacts: true
  model_name: churn-risk-model
  register_model: true
